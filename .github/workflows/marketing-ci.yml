# CI for the marketing site (repo root) — Phase 7 §7.9/§7.10 (JARVIS 95% MAESTRO
# PACK): "truthfulness enforcement in CI" and "Playwright suite green in CI" both
# need an actual CI job, not just a clean local run. Scoped to paths OUTSIDE
# finnor-os/ (that repo has its own workflow, ci.yml) so the two don't trigger on
# each other's changes.
name: marketing-ci
on:
  pull_request:
    paths-ignore: ["finnor-os/**"]
  push:
    branches: [main]
    paths-ignore: ["finnor-os/**"]
jobs:
  lint-typecheck-e2e:
    runs-on: ubuntu-latest
    env:
      # The Supabase ANON/publishable key, not the service-role secret — Next.js
      # bakes every NEXT_PUBLIC_* var into the client JS bundle at build time, so
      # this is already visible to anyone opening devtools on the live site; it is
      # not confidential, and prerendering /jarvis and /jarvis/login genuinely
      # requires it to be set (real first CI run of this workflow failed on `npm
      # run build` with "supabaseUrl is required" without it — reproduced locally
      # by unsetting it, root-caused, not guessed).
      NEXT_PUBLIC_SUPABASE_URL: https://kpxrnonhnhexutvdywbh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_pL3At585tx6uLFymhYtjbA_HJvVTeWB
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Phase 7 §7.8: no-restricted-properties(Math.random) under src/components/
      # jarvis and src/app/jarvis, defined in .eslintrc.cjs — this is what actually
      # enforces it; running lint in CI is what makes that enforcement real instead
      # of just a local convention.
      - run: npm run lint
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      # Runs against the production build via `next start` (playwright.config.ts's
      # webServer), not `next dev` — closer to what's actually deployed.
      # jarvis-authenticated.spec.ts's real-login flows skip cleanly here (no
      # TEST_OWNER_EMAIL/TEST_OWNER_PASSWORD secret configured yet — see
      # finnor-os/docs/owner-actions.md for why a real credential isn't faked);
      # jarvis-public.spec.ts's 10 tests run for real.
      - run: npm run start &
        env:
          PORT: 3000
      - run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Playwright e2e (list reporter also written to the job summary for public visibility)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          TEST_OWNER_EMAIL: ${{ secrets.TEST_OWNER_EMAIL }}
          TEST_OWNER_PASSWORD: ${{ secrets.TEST_OWNER_PASSWORD }}
        run: |
          set -o pipefail
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx playwright test --reporter=list 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=$?
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
