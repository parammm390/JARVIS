# Local Postgres (with pgvector) + Redis ONLY — for contributors not using Supabase's
# hosted/local CLI. Production does not run in this compose file (§24, §29).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: finnor
      POSTGRES_PASSWORD: finnor
      POSTGRES_DB: finnor
    ports:
      - "5432:5432"
    volumes:
      - finnor_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  finnor_pg:
